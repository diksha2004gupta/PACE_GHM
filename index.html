<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gale History Museum</title>
<link href="styles.css" rel="stylesheet">

</head>
<body>
<div class="page">
    <div class="topbar">
      <div class="brand">Gale History Museum</div>
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
    </div>

    <main class="hero">
      <div class="hero-content">
        <h1>Explore the Gale History Museum</h1>
        <p>Tap an NFC point as you move through the museum to hear the story of each exhibit.</p>

        <div class="hero-actions">
          <a href="01_welcome.html">Start at Entrance</a>
          <a href="001_exhibits.html">Browse Exhibits</a>
        </div>
      </div>
    </main>

    <div class="drawer-overlay" id="overlay"></div>

    <nav class="drawer" id="drawer" aria-label="Main menu">
      <h2>Menu</h2>
      <a href="001_exhibits.html">Exhibits</a>
      <a href="7_temporary.html">Temporary Exhibit</a>
      <a href="01_welcome.html">About</a>
    </nav>
  </div>
	<script>
    const menuBtn = document.getElementById("menuBtn");
    const drawer = document.getElementById("drawer");
    const overlay = document.getElementById("overlay");

    function openMenu() {
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeMenu() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    menuBtn.addEventListener("click", openMenu);
    overlay.addEventListener("click", closeMenu);
  </script>
</body>
</html>
